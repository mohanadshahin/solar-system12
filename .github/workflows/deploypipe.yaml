name: Build & Push to GCP

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Fetch all tags
        run: git fetch --tags

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Get Git Tag
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "no-tag")
          echo "TAG=$TAG" >> $GITHUB_ENV
      - name: Set image tags
        run: |
          echo "IMAGE_TAG_SHA=${GITHUB_SHA}" >> $GITHUB_ENV
          if [ "$TAG" != "no-tag" ]; then
            echo "IMAGE_TAG_VERSION=$TAG" >> $GITHUB_ENV
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build image
        run: |
          docker build \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/repo/${{ env.IMAGE_NAME }}:${IMAGE_TAG_SHA} \
            .

      - name: Tag with Git version
        if: env.IMAGE_TAG_VERSION != ''
        run: |
          docker tag \
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/repo/${{ env.IMAGE_NAME }}:${IMAGE_TAG_SHA} \
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/repo/${{ env.IMAGE_NAME }}:${IMAGE_TAG_VERSION}

      - name: Scan image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/repo/${{ env.IMAGE_NAME }}:${IMAGE_TAG_SHA}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Push image (SHA)
        run: |
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/repo/${{ env.IMAGE_NAME }}:${IMAGE_TAG_SHA}

      - name: Push version tag
        if: env.IMAGE_TAG_VERSION != ''
        run: |
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/repo/${{ env.IMAGE_NAME }}:${IMAGE_TAG_VERSION}

      # 🔹 Slack Notification (Success)
      - name: Notify Slack Success
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "✅ Build succeeded for ${{ github.repository }} - commit ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      # 🔹 Slack Notification (Failure)
      - name: Notify Slack Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "❌ Build FAILED for ${{ github.repository }} - commit ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}