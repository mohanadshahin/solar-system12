name: pipeline 1 pr

on:
  pull_request:
    branches: [ main ]

env:
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
  MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
  MONGO_URI: ${{ vars.MONGO_URI }}

jobs:

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint


  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: npm test -- --coverage

      - name: Check Coverage
        run: |
          COVERAGE=$(grep -Po 'All files[^|]*\|[^|]*\s+\K\d+' coverage/lcov-report/index.html | head -1)
          echo "Coverage is $COVERAGE%"
          if [ "$COVERAGE" -lt "80" ]; then
            echo "Coverage is below 80%"
            exit 1
          fi


  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node   
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies   
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
